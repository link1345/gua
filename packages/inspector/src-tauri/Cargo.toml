[package]
name = "gua-inspector"
version = "0.0.0"
description = "Desktop shell for the Gua Inspector."
authors = ["Gua contributors"]
edition = "2021"
license = "MIT"

[lib]
name = "gua_inspector_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
