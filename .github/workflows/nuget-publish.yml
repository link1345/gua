name: NuGet Publish

on:
  workflow_dispatch:
    inputs:
      major:
        description: New major version (major upgrades only; leave empty for an automatic minor release)
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - .github/workflows/nuget-publish.yml
      - .github/scripts/next-release-version.ps1
      - Directory.Build.props
      - CMakeLists.txt
      - CMakePresets.json
      - bindings/dotnet/src/Gua.Core/**
      - bindings/dotnet/src/Gua.Testing/**
      - bindings/dotnet/src/Gua.Testing.Godot/**
      - bindings/dotnet/src/Gua.Testing.Visual/**
      - bindings/dotnet/src/Gua.Testing.Recording/**
      - bindings/dotnet/tests/Gua.Visual.Tests/**
      - native/gua-core/**
      - protocol/**

permissions:
  contents: write
  id-token: write

concurrency:
  group: nuget-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Pack and publish .NET packages
    runs-on: windows-latest
    environment: release
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release version
        id: version
        shell: pwsh
        env:
          REQUESTED_MAJOR: ${{ inputs.major }}
        run: .github/scripts/next-release-version.ps1 -TagPrefix nuget -RequestedMajor $env:REQUESTED_MAJOR

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Configure native runtime
        run: cmake --preset windows-msvc-release "-DGUA_VERSION=${{ steps.version.outputs.version }}" "-DGUA_BUILD_ID=${{ github.sha }}"

      - name: Verify injected release metadata
        shell: pwsh
        run: |
          $cache = Get-Content build/windows-msvc-release/CMakeCache.txt -Raw
          if ($cache -notmatch 'GUA_VERSION:STRING=${{ steps.version.outputs.version }}' -or $cache -notmatch 'GUA_BUILD_ID:STRING=${{ github.sha }}') {
            throw 'Configured Gua version/build ID does not match the release tag and commit.'
          }

      - name: Build native runtime
        run: cmake --build --preset windows-msvc-release --target gua --config Release

      - name: Restore
        shell: pwsh
        run: |
          dotnet restore bindings/dotnet/src/Gua.Testing.Godot/Gua.Testing.Godot.csproj
          dotnet restore bindings/dotnet/tests/Gua.Visual.Tests/Gua.Visual.Tests.csproj

      - name: Build
        run: dotnet build bindings/dotnet/src/Gua.Testing.Godot/Gua.Testing.Godot.csproj --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Test Visual and Recording packages
        run: dotnet test bindings/dotnet/tests/Gua.Visual.Tests/Gua.Visual.Tests.csproj --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Pack Gua.Core
        run: dotnet pack bindings/dotnet/src/Gua.Core/Gua.Core.csproj --configuration Release --no-build -p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Pack Gua.Testing
        run: dotnet pack bindings/dotnet/src/Gua.Testing/Gua.Testing.csproj --configuration Release --no-build -p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Pack Gua.Testing.Godot
        run: dotnet pack bindings/dotnet/src/Gua.Testing.Godot/Gua.Testing.Godot.csproj --configuration Release --no-build -p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Pack Gua.Testing.Visual
        run: dotnet pack bindings/dotnet/src/Gua.Testing.Visual/Gua.Testing.Visual.csproj --configuration Release --no-build -p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Pack Gua.Testing.Recording
        run: dotnet pack bindings/dotnet/src/Gua.Testing.Recording/Gua.Testing.Recording.csproj --configuration Release --no-build -p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gua-nuget-packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error

      - name: Check NuGet trusted publisher user
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace("${{ vars.NUGET_USER }}")) {
            throw "Set the NUGET_USER repository variable to the nuget.org profile name used by the trusted publishing policy."
          }

      - name: NuGet login
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Publish packages to NuGet
        shell: pwsh
        run: |
          Push-Location artifacts/packages
          Get-ChildItem . -Filter *.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName `
              --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" `
              --source https://api.nuget.org/v3/index.json `
              --skip-duplicate
          }
          Pop-Location

      - name: Record published version
        shell: pwsh
        run: |
          git tag '${{ steps.version.outputs.tag }}' $env:GITHUB_SHA
          git push origin '${{ steps.version.outputs.tag }}'
