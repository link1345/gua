name: Inspector Release

on:
  workflow_dispatch:
    inputs:
      major:
        description: New major version (major upgrades only; leave empty for an automatic minor release)
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - .github/workflows/inspector-release.yml
      - .github/scripts/next-release-version.ps1
      - bun.lock
      - package.json
      - tsconfig.base.json
      - packages/inspector/**
      - packages/bridge-ws/**
      - native/gua-core/**
      - native/gua-imgui/**
      - native/gua-ws-bridge/**
      - examples/cpp-imgui/**
      - protocol/**

permissions:
  contents: write

concurrency:
  group: inspector-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build Inspector and attach release assets
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release version
        id: version
        shell: pwsh
        env:
          REQUESTED_MAJOR: ${{ inputs.major }}
        run: .github/scripts/next-release-version.ps1 -TagPrefix inspector -RequestedMajor $env:REQUESTED_MAJOR

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web inspector
        run: bun run --filter @gua/inspector build

      - name: Build Tauri inspector
        run: bun run --filter @gua/inspector tauri:build

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Gua Inspector v${{ steps.version.outputs.version }}
          body: |
            Automated Gua Inspector build from `${{ github.sha }}`.

            This release is created when the Inspector or its protocol/bridge inputs change on `main`.
          files: packages/inspector/src-tauri/target/release/bundle/**/*
          fail_on_unmatched_files: true
