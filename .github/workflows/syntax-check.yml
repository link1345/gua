name: Syntax Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  cpp:
    name: C++ / CMake
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build/cpp -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build/cpp --parallel

  csharp:
    name: C# / dotnet
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: |
          dotnet restore bindings/dotnet/src/Gua.Testing.Godot/Gua.Testing.Godot.csproj
          dotnet restore bindings/dotnet/src/Gua.Testing/Gua.Testing.csproj
          dotnet restore bindings/dotnet/src/Gua.Runtime/Gua.Runtime.csproj
          dotnet restore bindings/dotnet/src/Gua.Testing.Unity/Gua.Testing.Unity.csproj
          dotnet restore bindings/dotnet/tests/Gua.Unity.Integration.Tests/Gua.Unity.Integration.Tests.csproj

      - name: Build Gua.Core and Gua.Testing target frameworks
        run: |
          dotnet build bindings/dotnet/src/Gua.Core/Gua.Core.csproj --configuration Release --framework net10.0 --no-restore
          dotnet build bindings/dotnet/src/Gua.Core/Gua.Core.csproj --configuration Release --framework netstandard2.1 --no-restore
          dotnet build bindings/dotnet/src/Gua.Testing/Gua.Testing.csproj --configuration Release --framework net10.0 --no-restore
          dotnet build bindings/dotnet/src/Gua.Testing/Gua.Testing.csproj --configuration Release --framework netstandard2.1 --no-restore
          dotnet build bindings/dotnet/src/Gua.Runtime/Gua.Runtime.csproj --configuration Release --framework net10.0 --no-restore
          dotnet build bindings/dotnet/src/Gua.Runtime/Gua.Runtime.csproj --configuration Release --framework netstandard2.1 --no-restore
          dotnet build bindings/dotnet/src/Gua.Testing.Unity/Gua.Testing.Unity.csproj --configuration Release --framework net10.0 --no-restore
          dotnet build bindings/dotnet/src/Gua.Testing.Unity/Gua.Testing.Unity.csproj --configuration Release --framework netstandard2.1 --no-restore

      - name: Build existing consumers and Unity smoke host
        run: |
          dotnet build bindings/dotnet/src/Gua.Testing.Godot/Gua.Testing.Godot.csproj --configuration Release --no-restore
          dotnet build bindings/dotnet/tests/Gua.Unity.Integration.Tests/Gua.Unity.Integration.Tests.csproj --configuration Release --no-restore

  typescript:
    name: TypeScript / tsc
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check
        run: bun run check
