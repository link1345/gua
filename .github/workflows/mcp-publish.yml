name: MCP npm Publish

on:
  workflow_dispatch:
    inputs:
      major:
        description: New major version (major upgrades only; leave empty for an automatic minor release)
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - .github/workflows/mcp-publish.yml
      - .github/scripts/next-release-version.ps1
      - bun.lock
      - package.json
      - tsconfig.base.json
      - packages/mcp/**
      - packages/bridge-ws/**
      - native/gua-ws-bridge/**
      - protocol/**

permissions:
  contents: write
  id-token: write

concurrency:
  group: mcp-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish gui-mcp to npm
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release version
        id: version
        shell: pwsh
        env:
          REQUESTED_MAJOR: ${{ inputs.major }}
        run: .github/scripts/next-release-version.ps1 -TagPrefix mcp -RequestedMajor $env:REQUESTED_MAJOR

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        working-directory: .
        run: bun install --frozen-lockfile

      - name: Check
        run: bun run --filter gui-mcp check

      - name: Build
        run: bun run --filter gui-mcp build

      - name: Prepare publish package
        id: prepare
        shell: bash
        run: |
          package_version="${{ steps.version.outputs.version }}"
          publish_dir="${RUNNER_TEMP}/gui-mcp-package"

          rm -rf "${publish_dir}"
          mkdir -p "${publish_dir}/dist"
          cp packages/mcp/README.md "${publish_dir}/README.md"
          cp -R packages/mcp/dist/. "${publish_dir}/dist/"

          PACKAGE_VERSION="${package_version}" PUBLISH_DIR="${publish_dir}" node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const packageJson = JSON.parse(fs.readFileSync("packages/mcp/package.json", "utf8"));
          packageJson.version = process.env.PACKAGE_VERSION;
          delete packageJson.scripts;
          delete packageJson.devDependencies;

          fs.writeFileSync(
            path.join(process.env.PUBLISH_DIR, "package.json"),
            `${JSON.stringify(packageJson, null, 2)}\n`,
          );
          NODE

          echo "publish_dir=${publish_dir}" >> "${GITHUB_OUTPUT}"

      - name: Verify package contents
        run: |
          cd "${{ steps.prepare.outputs.publish_dir }}"
          npm pack --dry-run

      - name: Publish to npm
        run: |
          cd "${{ steps.prepare.outputs.publish_dir }}"
          npm publish --access public --tag latest

      - name: Record published version
        shell: pwsh
        run: |
          git tag '${{ steps.version.outputs.tag }}' $env:GITHUB_SHA
          git push origin '${{ steps.version.outputs.tag }}'
